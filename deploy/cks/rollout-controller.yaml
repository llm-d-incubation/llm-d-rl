apiVersion: v1
kind: Service
metadata:
  name: rollout-controller
  namespace: llm-d-rl
spec:
  selector:
    app: rollout-controller
  ports:
    - name: http
      port: 8090
      targetPort: 8090
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rollout-controller
  namespace: llm-d-rl
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rollout-controller
  template:
    metadata:
      labels:
        app: rollout-controller
    spec:
      containers:
        - name: controller
          image: ghcr.io/chcost/llm-d-rl:latest
          args:
            - "--port=8090"
            - "--engines=http://vllm-engine-0.vllm-engine.llm-d-rl.svc.cluster.local:8000"
            - "--health-check-interval=15s"
          ports:
            - containerPort: 8090
          readinessProbe:
            httpGet:
              path: /v1/health
              port: 8090
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /v1/health
              port: 8090
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: "500m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
