# llm-d Inference Stack: EPP + InferencePool + Gateway + HTTPRoute
#
# Deploys the llm-d inference scheduling infrastructure into the llm-d-rl namespace.
# The EPP discovers vLLM pods via the InferencePool label selector and provides
# KV-cache-aware, load-aware routing for inference requests.
#
# Prerequisites:
#   - Gateway API CRDs and Inference Extension CRDs installed (see 00-prereqs.sh)
#   - Istio or other compatible gateway controller running
#   - vLLM pods with label llm-d.ai/inference-serving=true in this namespace
#
# Derived from:
#   - llm-d-inference-scheduler/deploy/components/inference-gateway/*.yaml
#   - llm-d/guides/inference-scheduling/gaie-inference-scheduling/values.yaml
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: llm-d-epp
  namespace: llm-d-rl
---
kind: Role
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: llm-d-epp
  namespace: llm-d-rl
rules:
- apiGroups: ["inference.networking.x-k8s.io"]
  resources: ["inferencepools", "inferenceobjectives", "inferencemodelrewrites"]
  verbs: ["get", "watch", "list"]
- apiGroups: ["inference.networking.k8s.io"]
  resources: ["inferencepools"]
  verbs: ["get", "watch", "list"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "watch", "list"]
- apiGroups: ["authentication.k8s.io"]
  resources: ["tokenreviews"]
  verbs: ["create"]
- apiGroups: ["authorization.k8s.io"]
  resources: ["subjectaccessreviews"]
  verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: llm-d-epp-binding
  namespace: llm-d-rl
subjects:
- kind: ServiceAccount
  name: llm-d-epp
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: llm-d-epp
---
# EPP plugin configuration — load-aware + prefix-cache-aware scheduling.
apiVersion: v1
kind: ConfigMap
metadata:
  name: epp-config
  namespace: llm-d-rl
data:
  epp-config.yaml: |
    apiVersion: inference.networking.x-k8s.io/v1alpha1
    kind: EndpointPickerConfig
    plugins:
    - type: prefix-cache-scorer
    - type: decode-filter
    - type: max-score-picker
    - type: single-profile-handler
    schedulingProfiles:
    - name: default
      plugins:
      - pluginRef: decode-filter
      - pluginRef: max-score-picker
      - pluginRef: prefix-cache-scorer
        weight: 2
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-d-epp
  namespace: llm-d-rl
  labels:
    app: llm-d-epp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llm-d-epp
  template:
    metadata:
      labels:
        app: llm-d-epp
    spec:
      serviceAccountName: llm-d-epp
      terminationGracePeriodSeconds: 130
      containers:
      - name: epp
        image: ghcr.io/llm-d/llm-d-inference-scheduler:v0.5.0
        imagePullPolicy: Always
        args:
        - --pool-name
        - llm-d-pool
        - --grpc-port
        - "9002"
        - --grpc-health-port
        - "9003"
        - --config-file
        - /etc/epp/epp-config.yaml
        - --kv-cache-usage-percentage-metric
        - "vllm:kv_cache_usage_perc"
        - --v
        - "3"
        - --zap-encoder
        - "json"
        env:
        - name: PYTHONHASHSEED
          value: "42"
        ports:
        - containerPort: 9002
        - containerPort: 9003
        - name: metrics
          containerPort: 9090
        livenessProbe:
          grpc:
            port: 9003
            service: envoy.service.ext_proc.v3.ExternalProcessor
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          grpc:
            port: 9003
            service: envoy.service.ext_proc.v3.ExternalProcessor
          initialDelaySeconds: 5
          periodSeconds: 10
        volumeMounts:
        - name: epp-config
          mountPath: /etc/epp
        - name: cache
          mountPath: /cache
      volumes:
      - name: epp-config
        configMap:
          name: epp-config
      - name: cache
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: llm-d-epp
  namespace: llm-d-rl
spec:
  selector:
    app: llm-d-epp
  ports:
  - name: grpc
    protocol: TCP
    port: 9002
    targetPort: 9002
    appProtocol: http2
  - name: metrics
    protocol: TCP
    port: 9090
    targetPort: 9090
  type: ClusterIP
---
# InferencePool — the EPP watches pods matching these labels.
# vLLM pods must carry llm-d.ai/inference-serving=true to be included.
apiVersion: inference.networking.k8s.io/v1
kind: InferencePool
metadata:
  name: llm-d-pool
  namespace: llm-d-rl
spec:
  selector:
    matchLabels:
      llm-d.ai/inference-serving: "true"
  endpointPickerRef:
    name: llm-d-epp
    kind: Service
    port:
      number: 9002
  targetPorts:
  - number: 8000
---
# Gateway — Istio creates an Envoy proxy with a Service named
# llm-d-inference-gateway-istio in this namespace.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: llm-d-inference-gateway
  namespace: llm-d-rl
spec:
  gatewayClassName: istio
  listeners:
  - name: default
    port: 80
    protocol: HTTP
---
# HTTPRoute — routes all traffic through the InferencePool (EPP).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: llm-d-pool-route
  namespace: llm-d-rl
spec:
  parentRefs:
  - name: llm-d-inference-gateway
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - group: inference.networking.k8s.io
      kind: InferencePool
      name: llm-d-pool
      port: 8000
    timeouts:
      request: 120s
