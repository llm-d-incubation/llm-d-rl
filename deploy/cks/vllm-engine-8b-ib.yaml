apiVersion: v1
kind: Service
metadata:
  name: vllm-engine
  namespace: llm-d-rl
spec:
  clusterIP: None
  selector:
    app: vllm-engine
  ports:
    - name: http
      port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: vllm-engine
  namespace: llm-d-rl
spec:
  serviceName: vllm-engine
  replicas: 4
  selector:
    matchLabels:
      app: vllm-engine
  template:
    metadata:
      labels:
        app: vllm-engine
    spec:
      nodeSelector:
        kubernetes.io/hostname: gc3a4f4
      containers:
        - name: vllm
          image: vllm/vllm-openai:latest
          ports:
            - containerPort: 8000
          env:
            - name: VLLM_SERVER_DEV_MODE
              value: "1"
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token
                  key: token
                  optional: true
            - name: NCCL_IB_DISABLE
              value: "0"
            - name: NCCL_NET
              value: "IB"
            - name: NCCL_DEBUG
              value: "INFO"
            - name: NCCL_IB_HCA
              value: "ibp"
          command: ["python3", "-m", "vllm.entrypoints.openai.api_server"]
          args:
            - "--model"
            - "meta-llama/Llama-3.1-8B-Instruct"
            - "--port"
            - "8000"
            - "--enforce-eager"
            - "--max-model-len"
            - "2048"
            - "--gpu-memory-utilization"
            - "0.85"
            - "--weight-transfer-config"
            - '{"backend":"nccl"}'
          resources:
            limits:
              nvidia.com/gpu: "1"
              rdma/ib: "1"
            requests:
              nvidia.com/gpu: "1"
              rdma/ib: "1"
              memory: "32Gi"
              cpu: "4"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 180
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 240
            periodSeconds: 30
      tolerations:
        - key: "nvidia.com/gpu"
          operator: "Exists"
          effect: "NoSchedule"
