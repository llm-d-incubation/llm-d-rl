# llm-d Gateway — InferencePool + Gateway + HTTPRoute.
#
# Routes inference requests through the EPP for KV-cache-aware pod selection.
# Deploy AFTER the EPP is running (see epp.yaml).
#
# Prerequisites:
#   - Gateway API CRDs and Inference Extension CRDs installed (see deploy/llm-d/prereqs.sh)
#   - Istio or other compatible gateway controller running
#   - EPP deployed and ready (see epp.yaml)
---
# InferencePool — the EPP watches pods matching these labels.
# vLLM pods must carry llm-d.ai/inference-serving=true to be included.
apiVersion: inference.networking.k8s.io/v1
kind: InferencePool
metadata:
  name: llm-d-pool
  namespace: llm-d-rl
spec:
  selector:
    matchLabels:
      llm-d.ai/inference-serving: "true"
  endpointPickerRef:
    name: llm-d-epp
    kind: Service
    port:
      number: 9002
  targetPorts:
  - number: 8000
---
# Gateway — Istio creates an Envoy proxy with a Service named
# llm-d-inference-gateway-istio in this namespace.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: llm-d-inference-gateway
  namespace: llm-d-rl
spec:
  gatewayClassName: istio
  listeners:
  - name: default
    port: 80
    protocol: HTTP
---
# HTTPRoute — routes all traffic through the InferencePool (EPP).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: llm-d-pool-route
  namespace: llm-d-rl
spec:
  parentRefs:
  - name: llm-d-inference-gateway
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - group: inference.networking.k8s.io
      kind: InferencePool
      name: llm-d-pool
      port: 8000
    timeouts:
      request: 120s
