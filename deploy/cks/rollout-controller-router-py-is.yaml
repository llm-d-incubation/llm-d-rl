# Rollout controller — py-inference-scheduler router mode.
#
# Routes generation requests through the py-is scheduling proxy for
# load-aware, KV-cache-aware routing. See README-py-is.md.
#
# Differences from rollout-controller.yaml:
#   - --engine-selector: llm-d-rl.io/role=rollout-engine (weight sync pod discovery)
#   - --router-url: py-is server (picks best vLLM pod via queue/KV scoring)
#   - --tokens-in=false: text prompts forwarded through py-is to vLLM — py-is scores on metrics, not prompt content
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: rollout-controller
  namespace: llm-d-rl
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: rollout-controller
  namespace: llm-d-rl
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: rollout-controller
  namespace: llm-d-rl
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: rollout-controller
subjects:
  - kind: ServiceAccount
    name: rollout-controller
    namespace: llm-d-rl
---
apiVersion: v1
kind: Service
metadata:
  name: rollout-controller
  namespace: llm-d-rl
spec:
  selector:
    app: rollout-controller
  ports:
    - name: http
      port: 8090
      targetPort: 8090
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rollout-controller
  namespace: llm-d-rl
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rollout-controller
  template:
    metadata:
      labels:
        app: rollout-controller
    spec:
      serviceAccountName: rollout-controller
      containers:
        - name: controller
          image: quay.io/ezrasilvera/myrepo/llm-d-rl:latest
          args:
            - "--port=8090"
            - "--engine-selector=llm-d-rl.io/role=rollout-engine"
            - "--engine-port=8000"
            - "--namespace=llm-d-rl"
            - "--router-url=http://py-is-server.llm-d-rl.svc.cluster.local:8080"
            - "--tokens-in=false"
            - "--health-check-interval=15s"
          ports:
            - containerPort: 8090
          readinessProbe:
            httpGet:
              path: /v1/health
              port: 8090
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /v1/health
              port: 8090
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: "500m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
