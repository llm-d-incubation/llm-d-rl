apiVersion: v1
kind: ConfigMap
metadata:
  name: verl-llmd-scripts
  namespace: llm-d-rl
data:
  # llmd_verl package files
  __init__.py: |
    """llmd-verl: veRL integration for llm-d-rl rollout infrastructure."""
    __version__ = "0.1.0"
  config.py: |
    from dataclasses import dataclass

    @dataclass
    class LlmdRolloutConfig:
        controller_url: str = "http://localhost:8090"
        master_port: int = 29500
        nccl_timeout_s: int = 300
        weight_sync_backend: str = "nccl"
        http_timeout_s: float = 120.0
        max_retries: int = 3
        retry_delay_s: float = 1.0
  client.py: |
    from __future__ import annotations
    import json
    import logging
    import time
    from typing import Any
    from urllib.error import HTTPError
    from urllib.request import Request, urlopen
    from .config import LlmdRolloutConfig

    logger = logging.getLogger(__name__)

    class RolloutControllerClient:
        def __init__(self, config=None, base_url=None):
            if config is None:
                from .config import LlmdRolloutConfig
                config = LlmdRolloutConfig(controller_url=base_url or "http://localhost:8090")
            self.config = config
            self.base_url = config.controller_url.rstrip("/")
            self.timeout = config.http_timeout_s

        def _post(self, path, body=None):
            url = self.base_url + path
            data = json.dumps(body or {}).encode()
            req = Request(url, data=data, method="POST",
                          headers={"Content-Type": "application/json"})
            try:
                with urlopen(req, timeout=self.timeout) as resp:
                    content = resp.read()
                    return json.loads(content) if content else {}
            except HTTPError as exc:
                body_text = exc.read().decode(errors="replace")
                raise RuntimeError(f"POST {path} returned {exc.code}: {body_text}") from exc

        def _get(self, path):
            url = self.base_url + path
            req = Request(url, method="GET")
            try:
                with urlopen(req, timeout=self.timeout) as resp:
                    content = resp.read()
                    return json.loads(content) if content else {}
            except HTTPError as exc:
                body_text = exc.read().decode(errors="replace")
                raise RuntimeError(f"GET {path} returned {exc.code}: {body_text}") from exc

        def health_check(self):
            try:
                data = self._get("/v1/health")
                return data.get("status") == "ok"
            except Exception:
                return False

        def wait_for_ready(self, timeout=600):
            start = time.time()
            while time.time() - start < timeout:
                if self.health_check():
                    status = self.get_pool_status()
                    if status.get("ready_engines", 0) > 0:
                        return status
                logger.info("Waiting for controller + engines...")
                time.sleep(10)
            raise TimeoutError(f"Controller not ready after {timeout}s")

        def get_pool_status(self):
            return self._get("/v1/pool/status")

        def generate(self, prompt_token_ids, max_tokens=32, temperature=0.7, **kwargs):
            body = {"prompt_token_ids": prompt_token_ids,
                    "sampling_params": {"temperature": temperature, "max_tokens": max_tokens, **kwargs}}
            return self._post("/v1/generate", body)

        def init_weight_transfer(self, master_address, master_port, world_size, backend="nccl"):
            return self._post("/v1/weights/init", {
                "backend": backend, "master_address": master_address,
                "master_port": master_port, "trainer_world_size": world_size,
                "packed": False, "is_checkpoint_format": True})

        def update_weights(self, target_version, param_names=None, param_dtypes=None,
                           param_shapes=None, pause_mode="keep", reset_kv_cache=True):
            body = {"target_version": target_version, "pause_mode": pause_mode,
                    "reset_kv_cache": reset_kv_cache}
            if param_names is not None:
                body.update({"param_names": param_names, "param_dtypes": param_dtypes or [],
                             "param_shapes": param_shapes or []})
            return self._post("/v1/weights/update", body)

        def update_weights_from_model(self, target_version, model):
            names, dtypes, shapes = [], [], []
            for name, param in model.named_parameters():
                names.append(name)
                dtypes.append(str(param.dtype).replace("torch.", ""))
                shapes.append(list(param.shape))
            return self.update_weights(target_version, names, dtypes, shapes)

        def get_weight_version(self):
            return self._get("/v1/weights/version").get("weight_version", 0)

        def sleep(self, level=2):
            return self._post("/v1/engines/sleep", {"level": level})

        def wake_up(self, tags):
            return self._post("/v1/engines/wake", {"tags": tags})
  checkpoint_engine.py: |
    from __future__ import annotations
    import logging
    import socket
    import threading
    import time
    import torch
    from .client import RolloutControllerClient
    from .config import LlmdRolloutConfig

    logger = logging.getLogger(__name__)

    def _get_pod_ip():
        return socket.gethostbyname(socket.gethostname())

    class LlmdCheckpointEngine:
        def __init__(self, config):
            self.config = config
            self.client = RolloutControllerClient(config)
            self.pynccl = None
            self.pg = None
            self.master_address = None
            self.master_port = config.master_port
            self.world_size = None
            self.weight_version = 0
            self._initialized = False

        def init_nccl_group(self):
            from vllm.distributed.utils import StatelessProcessGroup
            from vllm.distributed.device_communicators.pynccl import PyNcclCommunicator
            self.master_address = _get_pod_ip()
            status = self.client.get_pool_status()
            num_engines = status.get("total_engines", 1)
            self.world_size = 1 + num_engines
            logger.info("NCCL rendezvous: master=%s:%d, world_size=%d",
                         self.master_address, self.master_port, self.world_size)
            nccl_result = [None, None]
            nccl_error = [None]
            def create_nccl():
                try:
                    pg = StatelessProcessGroup.create(host=self.master_address,
                        port=self.master_port, rank=0, world_size=self.world_size)
                    pynccl = PyNcclCommunicator(pg, device=torch.device("cuda:0"))
                    nccl_result[0] = pynccl
                    nccl_result[1] = pg
                except Exception as e:
                    nccl_error[0] = e
            nccl_thread = threading.Thread(target=create_nccl, daemon=True)
            nccl_thread.start()
            time.sleep(1)
            self.client.init_weight_transfer(self.master_address, self.master_port,
                self.world_size, backend=self.config.weight_sync_backend)
            nccl_thread.join(timeout=self.config.nccl_timeout_s)
            if nccl_error[0]:
                raise RuntimeError(f"NCCL group setup failed: {nccl_error[0]}")
            self.pynccl, self.pg = nccl_result
            self._initialized = True
            logger.info("NCCL group established: %d ranks", self.world_size)

        def broadcast_weights(self, model, device=None):
            if device is None:
                device = torch.device("cuda:0")
            start = time.perf_counter()
            stream = torch.cuda.Stream(device=device)
            with torch.cuda.stream(stream):
                for name, param in model.named_parameters():
                    tensor = param.data.contiguous()
                    self.pynccl.broadcast(tensor, src=0, stream=stream)
            stream.synchronize()
            elapsed = time.perf_counter() - start
            logger.info("NCCL broadcast: %.3fs", elapsed)
            return elapsed

        def sync_weights(self, model, device=None):
            if not self._initialized:
                self.init_nccl_group()
            self.weight_version += 1
            broadcast_error = [None]
            broadcast_elapsed = [0.0]
            def do_broadcast():
                try:
                    time.sleep(0.5)
                    broadcast_elapsed[0] = self.broadcast_weights(model, device)
                except Exception as e:
                    broadcast_error[0] = e
            broadcast_thread = threading.Thread(target=do_broadcast, daemon=True)
            broadcast_thread.start()
            self.client.update_weights_from_model(self.weight_version, model)
            broadcast_thread.join(timeout=self.config.nccl_timeout_s)
            if broadcast_error[0]:
                raise RuntimeError(f"NCCL broadcast failed: {broadcast_error[0]}")
            logger.info("Weight sync: version=%d, nccl=%.3fs",
                         self.weight_version, broadcast_elapsed[0])
            return self.weight_version

        def finalize(self):
            self.pynccl = None
            self.pg = None
            self._initialized = False
            torch.cuda.empty_cache()
  manager.py: |
    from __future__ import annotations
    import logging
    import torch
    from .checkpoint_engine import LlmdCheckpointEngine
    from .client import RolloutControllerClient
    from .config import LlmdRolloutConfig

    logger = logging.getLogger(__name__)

    class LlmdCheckpointEngineManager:
        def __init__(self, config=None, controller_url=None):
            if config is None:
                config = LlmdRolloutConfig(controller_url=controller_url or "http://localhost:8090")
            self.config = config
            self.client = RolloutControllerClient(config)
            self.engine = LlmdCheckpointEngine(config)

        def init(self, timeout=600):
            status = self.client.wait_for_ready(timeout=timeout)
            logger.info("Controller ready: %d engines", status.get("total_engines", 0))
            self.engine.init_nccl_group()
            return status

        def sleep_replicas(self, level=2):
            self.client.sleep(level=level)

        def update_weights(self, model, device=None):
            return self.engine.sync_weights(model, device)

        def resume_replicas(self, tags=None):
            if tags is None:
                tags = ["weights", "kv_cache"]
            self.client.wake_up(tags=tags)

        @property
        def weight_version(self):
            return self.engine.weight_version

        def finalize(self):
            self.engine.finalize()
  ppo_with_llmd.py: |
    """PPO training loop using llm-d-rl via llmd_verl."""
    from __future__ import annotations
    import argparse
    import json
    import logging
    import time
    import torch

    log = logging.getLogger("ppo-llmd")

    def compute_rewards(responses):
        return [len(r.get("output_token_ids", [])) / 100.0 for r in responses]

    def train_step(model, step):
        with torch.no_grad():
            for param in model.parameters():
                param.data += torch.randn_like(param.data) * 0.001
        return 0.01 * (1.0 / (1.0 + step * 0.1))

    def main():
        parser = argparse.ArgumentParser()
        parser.add_argument("--controller-url",
                            default="http://rollout-controller.llm-d-rl.svc.cluster.local:8090")
        parser.add_argument("--model-name", default="meta-llama/Llama-3.1-8B-Instruct")
        parser.add_argument("--num-steps", type=int, default=10)
        parser.add_argument("--batch-size", type=int, default=4)
        parser.add_argument("--max-tokens", type=int, default=32)
        parser.add_argument("--device", default="cuda:0")
        args = parser.parse_args()

        logging.basicConfig(level=logging.INFO,
            format="%(asctime)s [%(levelname)s] %(name)s: %(message)s", datefmt="%H:%M:%S")

        device = torch.device(args.device)
        log.info("Loading model: %s", args.model_name)
        load_start = time.perf_counter()
        from transformers import AutoModelForCausalLM
        model = AutoModelForCausalLM.from_pretrained(
            args.model_name, torch_dtype=torch.bfloat16).to(device)
        model.eval()
        num_params = sum(p.numel() for p in model.parameters())
        log.info("Model loaded: %d params (%.1f GB) in %.1fs",
                 num_params, num_params * 2 / 1e9, time.perf_counter() - load_start)

        # Initialize llm-d-rl manager
        import sys
        sys.path.insert(0, "/scripts")
        from llmd_verl.config import LlmdRolloutConfig
        from llmd_verl.manager import LlmdCheckpointEngineManager

        config = LlmdRolloutConfig(controller_url=args.controller_url)
        manager = LlmdCheckpointEngineManager(config)
        status = manager.init(timeout=600)
        log.info("llm-d-rl ready: %d engines", status.get("total_engines", 0))

        all_metrics = []
        for step in range(1, args.num_steps + 1):
            step_start = time.perf_counter()
            m = {"step": step}

            # Generate
            gen_start = time.perf_counter()
            responses = []
            for i in range(args.batch_size):
                prompt_ids = list(range(100 + i * 20, 120 + i * 20))
                resp = manager.client.generate(prompt_ids, max_tokens=args.max_tokens)
                responses.append(resp)
            m["generate_s"] = time.perf_counter() - gen_start

            # Sleep
            manager.sleep_replicas()

            # Rewards + Train
            rewards = compute_rewards(responses)
            m["avg_reward"] = sum(rewards) / len(rewards)
            train_start = time.perf_counter()
            m["loss"] = train_step(model, step)
            m["train_s"] = time.perf_counter() - train_start

            # Weight sync
            sync_start = time.perf_counter()
            m["weight_version"] = manager.update_weights(model, device)
            m["sync_s"] = time.perf_counter() - sync_start

            # Resume
            manager.resume_replicas()

            m["step_total_s"] = time.perf_counter() - step_start
            log.info("[Step %d] total=%.3fs gen=%.3fs train=%.3fs sync=%.3fs reward=%.3f version=%d",
                     step, m["step_total_s"], m["generate_s"], m["train_s"],
                     m["sync_s"], m["avg_reward"], m["weight_version"])
            all_metrics.append(m)

        log.info("Training complete: %d steps", args.num_steps)
        print("===BENCH_RESULTS_START===")
        print(json.dumps({"system": "llmd-verl", "metrics": all_metrics}, indent=2))
        print("===BENCH_RESULTS_END===")
        manager.finalize()

    if __name__ == "__main__":
        main()
---
apiVersion: batch/v1
kind: Job
metadata:
  name: verl-llmd-trainer
  namespace: llm-d-rl
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: verl-llmd-trainer
    spec:
      nodeSelector:
        kubernetes.io/hostname: gc3a4f4
      restartPolicy: Never
      containers:
        - name: trainer
          image: vllm/vllm-openai:v0.19.0
          command: ["python3", "/scripts/ppo_with_llmd.py"]
          args:
            - "--controller-url"
            - "http://rollout-controller.llm-d-rl.svc.cluster.local:8090"
            - "--model-name"
            - "meta-llama/Llama-3.1-8B-Instruct"
            - "--num-steps"
            - "10"
            - "--batch-size"
            - "4"
            - "--max-tokens"
            - "32"
          env:
            - name: NCCL_IB_DISABLE
              value: "0"
            - name: NCCL_NET
              value: "IB"
            - name: NCCL_DEBUG
              value: "INFO"
            - name: NCCL_IB_HCA
              value: "ibp"
            - name: PYTHONPATH
              value: "/scripts"
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token
                  key: token
                  optional: true
          volumeMounts:
            - name: scripts
              mountPath: /scripts/llmd_verl
              subPath: ""
              readOnly: true
            - name: ppo-script
              mountPath: /scripts/ppo_with_llmd.py
              subPath: ppo_with_llmd.py
              readOnly: true
          resources:
            limits:
              nvidia.com/gpu: "1"
              rdma/ib: "1"
            requests:
              nvidia.com/gpu: "1"
              rdma/ib: "1"
              memory: "32Gi"
              cpu: "4"
      volumes:
        - name: scripts
          configMap:
            name: verl-llmd-scripts
            items:
              - key: __init__.py
                path: __init__.py
              - key: config.py
                path: config.py
              - key: client.py
                path: client.py
              - key: checkpoint_engine.py
                path: checkpoint_engine.py
              - key: manager.py
                path: manager.py
        - name: ppo-script
          configMap:
            name: verl-llmd-scripts
            items:
              - key: ppo_with_llmd.py
                path: ppo_with_llmd.py
      tolerations:
        - key: "nvidia.com/gpu"
          operator: "Exists"
          effect: "NoSchedule"
