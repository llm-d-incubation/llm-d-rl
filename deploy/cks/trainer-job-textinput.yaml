# ConfigMaps are generated from python/ sources.
# Run: make generate-configmaps && kubectl apply -f deploy/cks/nccl-trainer-configmap.yaml -f deploy/cks/nccl-trainer-prompts-configmap.yaml
# Edit python/prompts.txt to customise prompts, then regenerate.
---
apiVersion: batch/v1
kind: Job
metadata:
  name: nccl-trainer-text
  namespace: llm-d-rl
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: nccl-trainer-text
    spec:
      restartPolicy: Never
      containers:
        - name: trainer
          image: vllm/vllm-openai:v0.19.0
          command: ["python3", "/scripts/nccl_weight_trainer.py"]
          args:
            - "--controller-url"
            - "http://rollout-controller.llm-d-rl.svc.cluster.local:8090"
            - "--model-name"
            - "meta-llama/Llama-3.2-1B"
            - "--prompt-file"
            - "/prompts/prompts.txt"
            - "--num-steps"
            - "5"
          env:
            - name: NCCL_DEBUG
              value: "INFO"
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: llm-d-hf-token
                  key: HF_TOKEN
                  optional: true
            - name: HUGGING_FACE_HUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: llm-d-hf-token
                  key: HF_TOKEN
                  optional: true
          volumeMounts:
            - name: trainer-script
              mountPath: /scripts
              readOnly: true
            - name: prompts
              mountPath: /prompts
              readOnly: true
            - name: cache
              mountPath: /.cache
            - name: config
              mountPath: /.config
            - name: shm
              mountPath: /dev/shm
          resources:
            limits:
              nvidia.com/gpu: "1"
            requests:
              nvidia.com/gpu: "1"
              memory: "32Gi"
              cpu: "4"
      volumes:
        - name: trainer-script
          configMap:
            name: nccl-trainer-script
        - name: prompts
          configMap:
            name: nccl-trainer-text-prompts
        - name: cache
          emptyDir: {}
        - name: config
          emptyDir: {}
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 20Gi
      tolerations:
        - key: "nvidia.com/gpu"
          operator: "Exists"
          effect: "NoSchedule"
